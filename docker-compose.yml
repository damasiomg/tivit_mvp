version: '1.0'

services:
  main:
    container_name: tivit_mvp
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - NEXT_PUBLIC_API_URL=https://api-onecloud.multicloud.tivit.com

    command: yarn dev
    ports:
      - 3000:3000